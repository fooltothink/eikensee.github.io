<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EIKEN Pre-1: Voice Narrator (v0.15)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        
        .correct-flash { animation: flash 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes flash {
            0% { background-color: transparent; }
            30% { background-color: #dcfce7; transform: scale(1.02); }
            100% { background-color: transparent; transform: scale(1); }
        }

        .score-pop { animation: scorePop 0.5s ease-out; }
        @keyframes scorePop {
            0% { transform: scale(1); color: #facc15; }
            50% { transform: scale(1.4); color: #ffffff; }
            100% { transform: scale(1); color: #facc15; }
        }

        /* Animation applied only on first entrance of a word set */
        .word-entrance { animation: slideIn 0.3s ease-out forwards; opacity: 0; }
        @keyframes slideIn {
            from { transform: translateY(10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .panel-image-container { background: #ffffff; border: 2px solid #e2e8f0; position: relative; }
        .panel-img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .timer-warning { animation: timerPulse 1s infinite; color: #ef4444; }
        @keyframes timerPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Frog Animation */
        @keyframes frogJump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px) scale(1.1); }
        }
        .frog-jump { animation: frogJump 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4">

<div id="app" class="max-w-5xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200 mt-4"></div>

<script>
const ICONS = {
    tv: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-24 h-24 text-indigo-400"><rect x="2" y="7" width="20" height="13" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>`,
    farm: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-24 h-24 text-green-500"><path d="M3 20h18M3 20v-8l9-5 9 5v8M9 20v-5h6v5"/></svg>`,
    harvest: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-24 h-24 text-amber-500"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M18.36 5.64l-1.42 1.42M7.05 16.95l-1.42 1.42M18.36 18.36l-1.42-1.42M7.05 7.05l-1.42-1.42"/></svg>`,
    office: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-24 h-24 text-slate-400"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>`,
    cafe: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-24 h-24 text-orange-400"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>`,
    news: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-24 h-24 text-blue-500"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8V6Z"/></svg>`,
    wallet: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-24 h-24 text-red-400"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4Z"/></svg>`,
    night: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-24 h-24 text-indigo-900"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`,
    grad: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-24 h-24 text-purple-500"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>`,
    train: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-24 h-24 text-slate-500"><rect x="4" y="3" width="16" height="16" rx="2"/><line x1="4" y1="11" x2="20" y2="11"/><line x1="8" y1="15" x2="8" y2="15.01"/><line x1="16" y1="15" x2="16" y2="15.01"/></svg>`,
    home: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="w-24 h-24 text-blue-400"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`
};

const SCENARIOS = [
    {
        id: 'day1',
        title: 'Day 1: The Farming Experience',
        openingSentence: "One day, a woman was watching a television program.",
        panels: [
            { id: 'd1p1', title: 'The Television Program', s: "There was a program about a campaign inviting viewers to join a farming experience.", e: "The woman seemed really interested in the program.", ex: "This was because she pictured herself working hard on a farm.", icon: ICONS.tv, img: "images/day1_1.png" },
            { id: 'd1p2', title: 'A Month Later', s: "The woman went to a farm and stood in a field with other participants.", e: "She and the others listened attentively to a professional farmer.", ex: "He was explaining the correct way to harvest potatoes.", icon: ICONS.farm, img: "images/day1_2.png" },
            { id: 'd1p3', title: 'An Hour Later', s: "Everyone was digging up potatoes in the field.", e: "They were enjoying themselves despite the hard work.", ex: "The woman remarked that the experience was more fun than she had expected.", icon: ICONS.harvest, img: "images/day1_3.png" },
            { id: 'd1p4', title: 'The Next Morning', s: "The woman was back at her office at 11:00 am.", e: "She looked exhausted and was struggling to finish her work.", ex: "This was because her body felt the physical toll of the manual labor from the day before.", icon: ICONS.office, img: "images/day1_4.png" }
        ]
    },
    {
        id: 'day2',
        title: 'Day 2: The Casino Job',
        openingSentence: "One day, a woman was looking for a job in her hometown.",
        panels: [
            { id: 'd2p1', title: 'The Closing Cafe', s: "She approached a café owner to ask for a job, but he was holding a sign that said the café was closing down.", e: "She noticed several other shops with 'FOR RENT' signs in their windows.", ex: "She felt disappointed because the local economy was struggling.", icon: ICONS.cafe, img: "day2_1.png" },
            { id: 'd2p2', title: 'Two Weeks Later', s: "While she was reading a newspaper, she saw an advertisement for a new casino that was hiring staff.", e: "She looked hopeful as she wrote down the contact information.", ex: "This was because she decided to apply for the position.", icon: ICONS.news, img: "day2_2.png" },
            { id: 'd2p3', title: 'Two Months Later', s: "The woman was working at the reception desk of the now-busy casino.", e: "She looked concerned and worried as she watched a customer staring into his empty wallet.", ex: "She realized that some people were spending too much money at the casino.", icon: ICONS.wallet, img: "day2_3.png" },
            { id: 'd2p4', title: 'Later That Night', s: "She was walking along a dark street from the casino and saw a group of men talking loudly.", e: "She looked nervous as she hurried past the rowdy group.", ex: "She realized that the atmosphere of her neighborhood had changed since the casino opened.", icon: ICONS.night, img: "day2_4.png" }
        ]
    }
    // ... more scenarios as needed
];

let state = {
    selectedScenario: SCENARIOS[0],
    currentPanelIndex: 0,
    currentType: 's',
    gameState: 'setup',
    shuffledWords: [],
    transcript: "",
    isListening: false,
    recognition: null,
    isCorrect: false,
    isRecognitionActive: false,
    audioContext: null,
    score: 0,
    isAnimatingScore: false,
    volume: 0,
    audioStream: null,
    analyser: null,
    dataArray: null,
    isEasyMode: false,
    easyModeIndex: 0,
    lastMatchedCount: 0,
    silenceTimer: null,
    timeLeft: 120,
    timerInterval: null,
    hasAnimatedThisTask: false // Track animation to prevent flashing
};

async function startVolumeMonitoring() {
    try {
        if (!state.audioContext) { state.audioContext = new (window.AudioContext || window.webkitAudioContext)(); }
        if (state.audioContext.state === 'suspended') await state.audioContext.resume();
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        state.audioStream = stream;
        const source = state.audioContext.createMediaStreamSource(stream);
        state.analyser = state.audioContext.createAnalyser();
        state.analyser.fftSize = 256;
        state.dataArray = new Uint8Array(state.analyser.frequencyBinCount);
        source.connect(state.analyser);
        updateVolumeLoop();
    } catch (err) { console.error("Mic access denied:", err); }
}

function updateVolumeLoop() {
    if (!state.isListening || state.gameState !== 'playing') return;
    state.analyser.getByteFrequencyData(state.dataArray);
    let values = 0;
    for (let i = 0; i < state.dataArray.length; i++) { values += state.dataArray[i]; }
    state.volume = values / state.dataArray.length;
    const micDot = document.getElementById('mic-indicator-dot');
    const micRing = document.getElementById('mic-indicator-ring');
    if (micDot && micRing) {
        const scale = 1 + (state.volume / 80);
        const opacity = 0.2 + (state.volume / 100);
        micDot.style.transform = `scale(${scale})`;
        micRing.style.transform = `scale(${scale * 1.8})`;
        micRing.style.opacity = opacity;
    }
    requestAnimationFrame(updateVolumeLoop);
}

function startExamTimer() {
    if (state.timerInterval) clearInterval(state.timerInterval);
    state.timeLeft = 120;
    state.timerInterval = setInterval(() => {
        if (state.gameState !== 'playing') { clearInterval(state.timerInterval); return; }
        state.timeLeft--;
        if (state.timeLeft <= 0) { state.timeLeft = 0; clearInterval(state.timerInterval); }
        renderTimerDisplay();
    }, 1000);
}

function renderTimerDisplay() {
    const timerEl = document.getElementById('exam-timer');
    if (!timerEl) return;
    const mins = Math.floor(state.timeLeft / 60);
    const secs = state.timeLeft % 60;
    timerEl.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
    if (state.timeLeft <= 30) { timerEl.classList.add('timer-warning'); } 
    else { timerEl.classList.remove('timer-warning'); }
}

function playSound(type) {
    if (!state.audioContext) state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = state.audioContext;
    if (ctx.state === 'suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    const now = ctx.currentTime;
    if (type === 'success') {
        osc.frequency.setValueAtTime(523.25, now);
        osc.frequency.exponentialRampToValueAtTime(880, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
    } else if (type === 'pop') {
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.linearRampToValueAtTime(0, now + 0.1);
        osc.start(now); osc.stop(now + 0.1);
    }
}

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    state.recognition = new SpeechRecognition();
    state.recognition.continuous = true;
    state.recognition.interimResults = true;
    state.recognition.lang = 'en-US';
    state.recognition.onstart = () => { state.isRecognitionActive = true; render(); };
    state.recognition.onresult = (event) => {
        if (state.isCorrect) return;
        
        let cumulativeTranscript = "";
        for (let i = 0; i < event.results.length; ++i) {
            cumulativeTranscript += event.results[i][0].transcript;
        }
        
        state.transcript = cumulativeTranscript;
        checkSpeech(); 
        
        const liveEl = document.getElementById('live-transcript');
        if (liveEl) liveEl.innerText = state.transcript || 'Speak the sentence...';

        if (state.silenceTimer) clearTimeout(state.silenceTimer);
        state.silenceTimer = setTimeout(() => {
            if (state.isListening && !state.isCorrect && state.transcript !== "") {
                state.transcript = ""; 
                if (state.recognition) state.recognition.stop(); 
            }
        }, 3000);
    };

    state.recognition.onend = () => {
        state.isRecognitionActive = false;
        if (!state.isCorrect) {
            state.transcript = "";
            const liveEl = document.getElementById('live-transcript');
            if (liveEl) liveEl.innerText = 'Speak the sentence...';
        }
        if (state.isListening && state.gameState === 'playing' && !state.isCorrect) {
            try { state.recognition.start(); } catch(e) {}
        }
        render();
    };
}

function scramble(sentence) { 
    state.hasAnimatedThisTask = false; // Reset animation trigger for new words
    return (sentence || "").split(' ').sort(() => Math.random() - 0.5); 
}

function triggerFrogJump() {
    const frogEl = document.getElementById('frog-emoji');
    if (frogEl) {
        frogEl.classList.add('frog-jump');
        setTimeout(() => frogEl.classList.remove('frog-jump'), 400);
    }
}

function checkSpeech() {
    const rawTarget = state.selectedScenario.panels[state.currentPanelIndex][state.currentType];
    if (!rawTarget) return;
    const targetWordsFull = rawTarget.split(/\s+/);
    const normalizedTarget = targetWordsFull.map(w => w.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_~()]/g,""));
    const input = state.transcript.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_~()]/g,"");

    if (state.isEasyMode) {
        let currentTargetWord = normalizedTarget[state.easyModeIndex];
        if (input.includes(currentTargetWord)) {
            state.easyModeIndex++;
            state.transcript = "";
            triggerFrogJump();
            playSound('pop');
            render();
            if (state.easyModeIndex >= targetWordsFull.length) triggerSuccess();
        }
    } else {
        const targetWordsShort = normalizedTarget.filter(w => w.length > 2);
        const matchedWords = targetWordsShort.filter(word => input.includes(word));
        
        if (matchedWords.length > state.lastMatchedCount) {
            triggerFrogJump();
            state.lastMatchedCount = matchedWords.length;
        }

        const accuracy = targetWordsShort.length > 0 ? (matchedWords.length / targetWordsShort.length) : 1;
        if (accuracy > 0.85 || input.includes(rawTarget.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_~()]/g,""))) triggerSuccess();
    }
}

function triggerSuccess() {
    if (state.silenceTimer) clearTimeout(state.silenceTimer);
    state.isCorrect = true; state.score += 100; state.isAnimatingScore = true;
    playSound('success'); render();
    setTimeout(() => { 
        state.isAnimatingScore = false; 
        handleSuccess(); 
    }, 3000);
}

function handleSuccess() {
    state.isCorrect = false; 
    state.transcript = ""; 
    state.easyModeIndex = 0; 
    state.lastMatchedCount = 0;
    if (state.recognition) state.recognition.stop(); // FORCE CLEAR BUFFER
    
    const panel = state.selectedScenario.panels[state.currentPanelIndex];
    if (state.currentType === 's') { state.currentType = panel.e ? 'e' : 'ex'; } 
    else if (state.currentType === 'e') { state.currentType = panel.ex ? 'ex' : 's'; if (state.currentType === 's') state.currentPanelIndex++; } 
    else { state.currentPanelIndex++; state.currentType = 's'; }

    if (state.currentPanelIndex >= state.selectedScenario.panels.length) {
        state.gameState = 'result'; state.isListening = false;
        if (state.timerInterval) clearInterval(state.timerInterval);
    } else {
        const nextPanel = state.selectedScenario.panels[state.currentPanelIndex];
        state.shuffledWords = scramble(nextPanel[state.currentType]);
        playSound('pop');
    }
    render();
}

function render() {
    const app = document.getElementById('app');
    if (!app) return;
    
    if (state.gameState === 'setup') {
        app.innerHTML = `
            <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                <div><h1 class="text-xl font-extrabold flex items-center gap-2"><span class="text-indigo-400">🏆</span> SEE Narrator</h1></div>
                <div class="bg-slate-800 px-4 py-1 rounded-full text-yellow-400 font-mono text-sm">High Score: ${localStorage.getItem('see_highscore') || 0}</div>
            </div>
            <div class="p-8 space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    ${SCENARIOS.map(s => `<button onclick="selectScenario('${s.id}')" class="p-4 rounded-2xl border-2 text-left ${state.selectedScenario.id === s.id ? 'border-indigo-500 bg-indigo-50' : 'border-slate-100'}">
                        <div class="font-bold">${s.title}</div></button>`).join('')}
                </div>
                <div class="p-4 bg-slate-50 rounded-2xl border-2 border-slate-100">
                    <label class="flex items-center cursor-pointer gap-3">
                        <input type="checkbox" onchange="state.isEasyMode = this.checked" ${state.isEasyMode ? 'checked' : ''} class="w-6 h-6">
                        <span class="font-bold text-slate-800">Easy Mode (Word-by-Word)</span>
                    </label>
                </div>
                <button onclick="startGame()" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg">START LESSON</button>
            </div>
        `;
    } else if (state.gameState === 'playing') {
        const panel = state.selectedScenario.panels[state.currentPanelIndex];
        const rawTarget = panel[state.currentType];
        const targetWordsFull = rawTarget.split(/\s+/);
        
        // Only apply animation class once per task
        const animClass = state.hasAnimatedThisTask ? "" : "word-entrance";
        state.hasAnimatedThisTask = true;

        app.innerHTML = `
            <div class="bg-slate-900 p-6 text-white flex justify-between items-center ${state.isCorrect ? 'correct-flash' : ''}">
                <div><h1 class="text-lg font-bold">${state.selectedScenario.title}</h1><div id="exam-timer" class="text-indigo-400 font-mono text-sm">2:00</div></div>
                <div class="text-2xl font-mono font-bold text-yellow-400 ${state.isAnimatingScore ? 'score-pop' : ''}">${state.score}</div>
            </div>
            <div class="p-8">
                <div class="flex flex-col md:flex-row gap-8 items-center mb-8">
                    <div class="w-full md:w-1/2 aspect-[4/3] panel-image-container rounded-2xl flex items-center justify-center overflow-hidden">
                        ${panel.img ? `<img src="${panel.img}" class="panel-img" />` : panel.icon}
                    </div>
                    <div class="w-full md:w-1/2">
                        <div class="flex justify-between items-center mb-4">
                            <div class="flex gap-1.5">${['s', 'e', 'ex'].map(t => `<div class="h-1.5 w-10 rounded-full ${state.currentType === t ? 'bg-indigo-500' : 'bg-slate-200'}"></div>`).join('')}</div>
                            <div class="flex items-center gap-2"><div id="mic-indicator-ring" class="w-3 h-3 rounded-full ${state.isRecognitionActive ? 'bg-red-500' : 'bg-slate-300'}"></div><span class="text-[10px] font-black uppercase text-slate-400">Mic ${state.isRecognitionActive ? 'On' : 'Off'}</span></div>
                        </div>
                        <div class="flex flex-wrap gap-2.5 min-h-[120px]">
                            ${state.shuffledWords.map((word, i) => `<span class="px-4 py-2 bg-white text-slate-800 rounded-xl font-bold border-2 border-slate-100 shadow-sm ${animClass}" style="animation-delay: ${i * 0.05}s">${word}</span>`).join('')}
                        </div>
                    </div>
                </div>
                <div class="flex flex-col items-center mb-6">
                    <div class="h-16 flex items-end"><span id="frog-emoji" class="text-5xl">🐸</span></div>
                    <div id="live-transcript" class="text-center text-indigo-500 italic text-xl min-h-[60px] font-bold">
                        ${state.transcript || 'Speak the sentence...'}
                    </div>
                </div>
                <button onclick="handleSuccess()" class="block mx-auto text-xs text-slate-300 underline font-black uppercase">Skip</button>
            </div>
        `;
        renderTimerDisplay();
    } else if (state.gameState === 'result') {
        app.innerHTML = `<div class="p-16 text-center animate-in zoom-in"><div class="text-8xl mb-8">🎊</div><h2 class="text-4xl font-black mb-10">Score: ${state.score}</h2><button onclick="resetGame()" class="px-12 py-4 bg-slate-900 text-white rounded-2xl font-black">MAIN MENU</button></div>`;
    }
}

function selectScenario(id) { state.selectedScenario = SCENARIOS.find(s => s.id === id); state.currentPanelIndex = 0; state.currentType = 's'; render(); }
function startGame() { state.gameState = 'playing'; state.score = 0; startVolumeMonitoring(); startExamTimer(); if (state.recognition) state.recognition.start(); handleSuccess(); }
function resetGame() { state.gameState = 'setup'; if (state.recognition) state.recognition.stop(); render(); }
render();
</script>
</body>
</html>
